<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Letter Wordle Ultimate</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title-box">
    <h1>6 Letter Wordle Ultimate</h1>
</div>

<div class="board">
    <div class="row">

        <div class="tile" id="tile0"></div>
        <div class="tile" id="tile1"></div>
        <div class="tile" id="tile2"></div>
        <div class="tile" id="tile3"></div>
        <div class="tile" id="tile4"></div>
        <div class="tile" id="tile5"></div>
    </div>

    <div class="row">
        <div class="tile" id="tile6"></div>
        <div class="tile" id="tile7"></div>
        <div class="tile" id="tile8"></div>
        <div class="tile" id="tile9"></div>
        <div class="tile" id="tile10"></div>
        <div class="tile" id="tile11"></div>
    </div>

    <div class="row">

        <div class="tile" id="tile12"></div>
        <div class="tile" id="tile13"></div>
        <div class="tile" id="tile14"></div>
        <div class="tile" id="tile15"></div>
        <div class="tile" id="tile16"></div>
        <div class="tile" id="tile17"></div>
    </div>

    <div class="row">

        <div class="tile" id="tile18"></div>
        <div class="tile" id="tile19"></div>
        <div class="tile" id="tile20"></div>
        <div class="tile" id="tile21"></div>
        <div class="tile" id="tile22"></div>
        <div class="tile" id="tile23"></div>
    </div>

    <div class="row">

        <div class="tile" id="tile24"></div>
        <div class="tile" id="tile25"></div>
        <div class="tile" id="tile26"></div>
        <div class="tile" id="tile27"></div>
        <div class="tile" id="tile28"></div>
        <div class="tile" id="tile29"></div>
    </div>

    <div class="row">

        <div class="tile" id="tile30"></div>
        <div class="tile" id="tile31"></div>
        <div class="tile" id="tile32"></div>
        <div class="tile" id="tile33"></div>
        <div class="tile" id="tile34"></div>
        <div class="tile" id="tile35"></div>
    </div>

<div id="keyboard">

    <div class="keyboard-row">
        <button class="key" id="keyQ">Q</button>
        <button class="key" id="keyW">W</button>
        <button class="key" id="keyE">E</button>
        <button class="key" id="keyR">R</button>
        <button class="key" id="keyT">T</button>
        <button class="key" id="keyY">Y</button>
        <button class="key" id="keyU">U</button>
        <button class="key" id="keyI">I</button>
        <button class="key" id="keyO">O</button>
        <button class="key" id="keyP">P</button>
    </div>

    <div class="keyboard-row">
        <button class="key" id="keyA">A</button>
        <button class="key" id="keyS">S</button>
        <button class="key" id="keyD">D</button>
        <button class="key" id="keyF">F</button>
        <button class="key" id="keyG">G</button>
        <button class="key" id="keyH">H</button>
        <button class="key" id="keyJ">J</button>
        <button class="key" id="keyK">K</button>
        <button class="key" id="keyL">L</button>
    </div>

    <div class="keyboard-row">
        <button class="key" id="keyZ">Z</button>
        <button class="key" id="keyX">X</button>
        <button class="key" id="keyC">C</button>
        <button class="key" id="keyV">V</button>
        <button class="key" id="keyB">B</button>
        <button class="key" id="keyN">N</button>
        <button class="key" id="keyM">M</button>
    </div>

</div>

    </div>

    <script src="words.js"></script>
    <script src="script.js"></script>
</body>
</html>
